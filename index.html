<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>Simple Calculator</h1>

      <div class="form-group">
        <label>First Number</label>
        <input type="number" id="num1" placeholder="Enter first number" />
      </div>

      <div class="form-group">
        <label>Second Number</label>
        <input type="number" id="num2" placeholder="Enter second number" />
      </div>

      <div class="buttons">
        <button onclick="addNumbers()">Add</button>
        <button onclick="subtractNumbers()">Subtract</button>
        <button onclick="multiplyNumbers()">Multiply</button>
        <button onclick="divideNumbers()">Divide</button>
      </div>

      <div class="result">Result: <span id="result">0</span></div>
    </div>

    <script>
      function getValues() {
        let num1 = parseFloat(document.getElementById("num1").value) || 0;
        let num2 = parseFloat(document.getElementById("num2").value) || 0;
        return { num1, num2 };
      }
    </script>

    <script src="addition.js"></script>
    <script src="multiplication.js"></script>
    <script src="substraction.js"></script>
    <script src="division.js"></script>
  </body>
</html>
